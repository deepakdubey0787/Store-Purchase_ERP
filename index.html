<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Store ERP - Purchase & Inventory</title>
    <style>
      :root {
        --brand: #2563eb;
        --brand-dark: #1d4ed8;
        --ink: #0f172a;
        --muted: #64748b;
        --line: #dbe3ef;
        --panel: #f8fafc;
        --good: #16a34a;
        --danger: #dc2626;
        --warn: #f97316;
        --soft: #eff6ff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #eef3f8;
        color: var(--ink);
        font-family: Arial, sans-serif;
      }
      h1,
      h2,
      h3,
      p {
        margin: 0;
      }
      h1 {
        font-size: 24px;
      }
      h2 {
        font-size: 20px;
      }
      h3 {
        font-size: 16px;
      }
      small,
      .muted {
        color: var(--muted);
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
      }
      button {
        cursor: pointer;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: white;
        padding: 9px 12px;
        font-weight: 700;
      }
      button.primary {
        border-color: var(--brand);
        background: var(--brand);
        color: white;
      }
      button.primary:hover {
        background: var(--brand-dark);
      }
      button.good {
        border-color: var(--good);
        background: var(--good);
        color: white;
      }
      button.danger {
        border-color: var(--danger);
        background: var(--danger);
        color: white;
      }
      button.active {
        border-color: var(--brand);
        background: var(--brand);
        color: white;
      }
      button.small {
        padding: 6px 8px;
        font-size: 12px;
      }
      input,
      select,
      textarea {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px;
        background: white;
        font-weight: 400;
      }
      textarea {
        min-height: 40px;
        resize: vertical;
      }
      label {
        display: grid;
        gap: 5px;
        font-size: 13px;
        font-weight: 700;
      }
      table {
        width: 100%;
        min-width: 1100px;
        border-collapse: collapse;
        font-size: 13px;
      }
      th,
      td {
        border-top: 1px solid var(--line);
        padding: 10px;
        text-align: left;
        vertical-align: top;
      }
      th {
        background: var(--panel);
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }
      .top {
        border-bottom: 1px solid var(--line);
        background: white;
      }
      header,
      .toolbar,
      .wrap {
        max-width: 1260px;
        margin: 0 auto;
        padding: 16px;
      }
      header {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        overflow-x: auto;
      }
      .wrap {
        padding-bottom: 40px;
      }
      .login {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }
      .login-card {
        width: min(980px, 100%);
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: white;
      }
      .hero {
        padding: 36px;
        background: var(--brand);
        color: white;
      }
      .hero p {
        margin-top: 12px;
        color: #dbeafe;
      }
      .login-panel {
        padding: 32px;
      }
      .grid {
        display: grid;
        gap: 12px;
      }
      .cards {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
      .form-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .panel,
      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        box-shadow: 0 1px 2px rgb(15 23 42 / 6%);
      }
      .panel {
        padding: 18px;
      }
      .card {
        padding: 16px;
      }
      .metric {
        margin-top: 8px;
        font-size: 28px;
        font-weight: 800;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .between {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        justify-content: space-between;
      }
      .table-wrap {
        overflow-x: auto;
      }
      .span-all {
        grid-column: 1 / -1;
      }
      .notice {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: white;
        color: var(--brand);
        padding: 12px;
        font-weight: 700;
      }
      .badge {
        display: inline-flex;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 700;
      }
      .Pending {
        background: #fef3c7;
        color: #92400e;
      }
      .Approved,
      .Partial {
        background: #dbeafe;
        color: #1e40af;
      }
      .Rejected,
      .Cancelled,
      .Critical {
        background: #fee2e2;
        color: #991b1b;
      }
      .Ordered {
        background: #e0e7ff;
        color: #3730a3;
      }
      .Received,
      .Posted,
      .Normal {
        background: #dcfce7;
        color: #166534;
      }
      .Urgent {
        background: #ffedd5;
        color: #9a3412;
      }
      .line-table input,
      .line-table select,
      .line-table textarea {
        min-width: 120px;
        padding: 7px;
      }
      .line-table textarea {
        min-width: 180px;
      }
      .line-table .wide {
        min-width: 190px;
      }
      .doc {
        display: grid;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: white;
      }
      .doc + .doc {
        margin-top: 12px;
      }
      .doc-head {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        align-items: center;
        justify-content: space-between;
      }
      .print-area {
        display: none;
      }
      @media (max-width: 900px) {
        .login-card,
        .cards,
        .form-grid,
        .two {
          grid-template-columns: 1fr;
        }
        header,
        .between {
          align-items: flex-start;
          flex-direction: column;
        }
      }
      @media print {
        .no-print {
          display: none !important;
        }
        body {
          background: white;
        }
        .print-area {
          display: block !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const DB_KEY = "store-erp-ready-db-v2";
      const OLD_KEY = "purchase-requirement-ready-db";
      const SHEET_URL_KEY = "store-erp-google-web-app-url";
      const DEFAULT_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwLxQjTBCwsBnmW_sWbXcnBeTBQqleU0KmDQdverqsGBg5xewKu_s2mpcvIesaYqpBFCg/exec";
      const roleLabels = { store: "Store Person", purchase_manager: "Purchase Manager", admin: "Admin" };
      const today = () => new Date().toISOString().slice(0, 10);
      const profilesSeed = [
        { id: "store-1", full_name: "Ramesh Store", role: "store", plant_access: "Plant A", email: "store@example.com", pin: "1111", active: "TRUE" },
        { id: "manager-1", full_name: "Purchase Manager", role: "purchase_manager", plant_access: "All Plants", email: "manager@example.com", pin: "2222", active: "TRUE" },
        { id: "admin-1", full_name: "Admin User", role: "admin", plant_access: "All Plants", email: "admin@example.com", pin: "9999", active: "TRUE" }
      ];
      const seed = {
        profiles: profilesSeed,
        departments: ["Maintenance", "Production", "Electrical", "Mechanical", "Admin", "Store"],
        items: [
          { id: "item-bolt", code: "ITM-001", name: "MS Bolt", spec: "M16 x 75, 8.8 Grade", unit: "Nos", category: "Fastener", location: "Rack A1", opening_stock: 40, min_stock: 100 },
          { id: "item-oil", code: "ITM-002", name: "Gear Oil", spec: "EP 220", unit: "Drum", category: "Lubricant", location: "Oil Room", opening_stock: 2, min_stock: 5 },
          { id: "item-bearing", code: "ITM-003", name: "Bearing", spec: "6205 ZZ", unit: "Nos", category: "Bearing", location: "Rack B2", opening_stock: 18, min_stock: 8 }
        ],
        requirements: [
          {
            id: "req-demo-1",
            doc_no: "REQ-20260625-0001",
            date: "2026-06-25",
            requested_by: "Ramesh Store",
            created_by: "store-1",
            status: "Pending",
            approved_by: null,
            approved_at: null,
            remarks: "Daily maintenance requirement",
            created_at: "2026-06-25T09:30:00.000Z",
            items: [
              { item_id: "item-bolt", item_name: "MS Bolt", spec: "M16 x 75, 8.8 Grade", qty: 250, unit: "Nos", department: "Maintenance", use: "Line maintenance", urgency: "Urgent", vendor: "Sharma Industrial", remarks: "Low stock" },
              { item_id: "item-oil", item_name: "Gear Oil", spec: "EP 220", qty: 12, unit: "Drum", department: "Mechanical", use: "Gearbox top-up", urgency: "Critical", vendor: "Mehta Lubricants", remarks: "Breakdown risk" }
            ]
          }
        ],
        orders: [],
        receipts: [
          {
            id: "grn-demo-1",
            doc_no: "GRN-20260625-0001",
            date: "2026-06-25",
            vendor: "Mehta Lubricants",
            challan_no: "CH-014",
            created_by: "store-1",
            status: "Posted",
            remarks: "Opening receipt sample",
            items: [{ item_id: "item-oil", item_name: "Gear Oil", spec: "EP 220", qty: 3, unit: "Drum", rate: 11800, department: "Store", use: "Stock refill", remarks: "" }]
          }
        ],
        issues: [
          {
            id: "iss-demo-1",
            doc_no: "ISS-20260625-0001",
            date: "2026-06-25",
            issued_to: "Maintenance Team",
            created_by: "store-1",
            status: "Posted",
            remarks: "Sample issue",
            items: [{ item_id: "item-bolt", item_name: "MS Bolt", spec: "M16 x 75, 8.8 Grade", qty: 20, unit: "Nos", department: "Maintenance", use: "Conveyor repair", remarks: "" }]
          }
        ]
      };

      let db = loadDb();
      let user = null;
      let tab = "dashboard";
      let notice = "";
      let sheetApiUrl = localStorage.getItem(SHEET_URL_KEY) || DEFAULT_SHEET_API_URL;
      let syncStatus = sheetApiUrl ? "Google Sheet URL saved." : "Google Sheet URL not connected.";
      let filters = { q: "", status: "", department: "", item: "", from: "", to: "" };
      let drafts = {
        req: [blankLine()],
        receipt: [blankLine()],
        issue: [blankLine()],
        po: []
      };

      function loadDb() {
        try {
          const stored = localStorage.getItem(DB_KEY);
          if (stored) return normalize(JSON.parse(stored));
          const old = localStorage.getItem(OLD_KEY);
          if (old) return migrateOld(JSON.parse(old));
        } catch {}
        return normalize(structuredClone(seed));
      }
      function saveDb() {
        localStorage.setItem(DB_KEY, JSON.stringify(db));
      }
      function normalize(data) {
        return {
          profiles: normalizeProfiles(data.profiles?.length ? data.profiles : profilesSeed),
          departments: data.departments?.length ? data.departments : seed.departments,
          items: normalizeItems(data.items?.length ? data.items : seed.items),
          requirements: data.requirements || [],
          orders: data.orders || [],
          receipts: data.receipts || [],
          issues: data.issues || []
        };
      }
      function normalizeProfiles(profiles) {
        return profiles.map((profile) => ({
          id: profile.id || id(),
          full_name: profile.full_name || "",
          role: profile.role || "store",
          plant_access: profile.plant_access || "",
          email: String(profile.email || "").trim().toLowerCase(),
          pin: String(profile.pin || ""),
          active: profile.active === false || String(profile.active || "TRUE").toLowerCase() === "false" ? "FALSE" : "TRUE"
        }));
      }
      function normalizeItems(items) {
        const usedCodes = new Set(items.map((item) => item.code).filter(Boolean));
        return items.map((item, index) => {
          const code = item.code || nextItemCodeFromSet(usedCodes, index + 1);
          usedCodes.add(code);
          return {
            id: item.id || id(),
            code,
            name: item.name || "",
            spec: item.spec || "",
            unit: item.unit || "Nos",
            category: item.category || "",
            location: item.location || "",
            opening_stock: num(item.opening_stock),
            min_stock: num(item.min_stock)
          };
        });
      }
      function nextItemCodeFromSet(usedCodes, startAt = 1) {
        let number = startAt;
        while (usedCodes.has("ITM-" + String(number).padStart(3, "0"))) number += 1;
        return "ITM-" + String(number).padStart(3, "0");
      }
      function migrateOld(old) {
        const migrated = structuredClone(seed);
        if (old.profiles?.length) migrated.profiles = old.profiles;
        if (old.requirements?.length) {
          migrated.requirements = old.requirements.map((r, index) => ({
            id: r.id || id(),
            doc_no: r.requirement_id || `REQ-MIGRATED-${String(index + 1).padStart(4, "0")}`,
            date: r.date || today(),
            requested_by: r.store_person_name || "Store",
            created_by: r.created_by || "store-1",
            status: r.status || "Pending",
            approved_by: r.approved_by || null,
            approved_at: r.approved_at || null,
            remarks: r.remarks || "",
            created_at: r.created_at || new Date().toISOString(),
            items: [
              {
                item_id: seed.items.find((item) => item.name === r.item_name && (!r.size_grade || item.spec === r.size_grade))?.id || "",
                item_name: r.item_name || "",
                spec: r.size_grade || "",
                qty: Number(r.required_quantity || 0),
                unit: r.unit || "Nos",
                department: r.department || "Maintenance",
                use: r.item_description || "",
                urgency: r.urgency || "Normal",
                vendor: r.vendor_name || "",
                remarks: r.remarks || ""
              }
            ]
          }));
        }
        return normalize(migrated);
      }
      function id() {
        return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
      }
      function nextNo(prefix, fixedIndex) {
        const stamp = today().replaceAll("-", "");
        const all = [...db.requirements, ...db.orders, ...db.receipts, ...db.issues];
        const count = fixedIndex || all.filter((d) => String(d.doc_no || "").startsWith(prefix + "-" + stamp)).length + 1;
        return `${prefix}-${stamp}-${String(count).padStart(4, "0")}`;
      }
      function nextItemCode() {
        const usedCodes = new Set(db.items.map((item) => item.code).filter(Boolean));
        return nextItemCodeFromSet(usedCodes, db.items.length + 1);
      }
      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[c]);
      }
      function num(value) {
        return Number(value || 0);
      }
      function money(value) {
        return new Intl.NumberFormat("en-IN", { maximumFractionDigits: 2 }).format(num(value));
      }
      function badge(value) {
        const cls = String(value || "").split(" ")[0];
        return `<span class="badge ${esc(cls)}">${esc(value || "-")}</span>`;
      }
      function blankLine() {
        return { item_id: "", item_name: "", spec: "", qty: "", unit: "Nos", department: "", use: "", urgency: "Normal", vendor: "", rate: "", remarks: "" };
      }
      function matchItemId(name, spec) {
        const found = db?.items?.find((item) => item.name === name && (!spec || item.spec === spec));
        return found?.id || "";
      }
      function itemById(itemId) {
        return db.items.find((item) => item.id === itemId);
      }
      function ensureMasterItem(line) {
        if (line.item_id && itemById(line.item_id)) return itemById(line.item_id);
        const name = String(line.item_name || "").trim();
        const spec = String(line.spec || "").trim();
        if (!name) return null;
        const existing = db.items.find((item) => item.name.toLowerCase() === name.toLowerCase() && String(item.spec || "").toLowerCase() === spec.toLowerCase());
        if (existing) {
          line.item_id = existing.id;
          return existing;
        }
        const created = {
          id: id(),
          code: nextItemCode(),
          name,
          spec,
          unit: line.unit || "Nos",
          category: "Auto",
          location: "",
          opening_stock: 0,
          min_stock: 0
        };
        db.items.push(created);
        line.item_id = created.id;
        return created;
      }
      function stockOf(itemId) {
        const item = itemById(itemId);
        const opening = num(item?.opening_stock);
        const received = db.receipts.flatMap((d) => d.items || []).filter((l) => l.item_id === itemId).reduce((sum, l) => sum + num(l.qty), 0);
        const issued = db.issues.flatMap((d) => d.items || []).filter((l) => l.item_id === itemId).reduce((sum, l) => sum + num(l.qty), 0);
        return opening + received - issued;
      }
      function docTotalQty(doc) {
        return (doc.items || []).reduce((sum, item) => sum + num(item.qty), 0);
      }
      function currentUserName(userId) {
        return db.profiles.find((p) => p.id === userId)?.full_name || "-";
      }
      function findLoginUser(email, pin) {
        const cleanEmail = String(email || "").trim().toLowerCase();
        const cleanPin = String(pin || "");
        return db.profiles.find((profile) => {
          const isActive = String(profile.active || "TRUE").toLowerCase() !== "false";
          return isActive && String(profile.email || "").trim().toLowerCase() === cleanEmail && String(profile.pin || "") === cleanPin;
        });
      }

      function render() {
        const app = document.getElementById("app");
        if (!user) {
          app.innerHTML = loginScreen();
          return;
        }
        const canManage = user.role === "purchase_manager" || user.role === "admin";
        const canAdmin = user.role === "admin";
        const pending = db.requirements.filter((r) => r.status === "Pending").length;
        const low = db.items.filter((item) => stockOf(item.id) <= num(item.min_stock)).length;
        app.innerHTML = `
          <div class="top no-print">
            <header>
              <div>
                <small style="color:var(--brand);font-weight:800">Store ERP</small>
                <h1>Purchase, Store Inventory & Department Issue</h1>
                <small>${sheetApiUrl ? "Google Sheet sync ready. Local backup bhi active hai." : "Local database active hai. Google Sheet URL connect kar sakte hain."}</small>
              </div>
              <div class="actions">
                ${pending ? `<span class="badge Pending">${pending} pending PR</span>` : ""}
                ${low ? `<span class="badge Critical">${low} low stock</span>` : ""}
                <span class="badge Normal">${esc(user.full_name)} - ${roleLabels[user.role]}</span>
                <button data-action="logout">Logout</button>
              </div>
            </header>
          </div>
          <nav class="toolbar no-print">
            <button class="${tab === "dashboard" ? "active" : ""}" data-action="tab" data-tab="dashboard">Dashboard</button>
            <button class="${tab === "requirement" ? "active" : ""}" data-action="tab" data-tab="requirement">Multi Item Requirement</button>
            ${canManage ? `<button class="${tab === "approval" ? "active" : ""}" data-action="tab" data-tab="approval">Approval</button>` : ""}
            ${canManage ? `<button class="${tab === "po" ? "active" : ""}" data-action="tab" data-tab="po">Purchase Order</button>` : ""}
            <button class="${tab === "receive" ? "active" : ""}" data-action="tab" data-tab="receive">Material Receive</button>
            <button class="${tab === "issue" ? "active" : ""}" data-action="tab" data-tab="issue">Material Issue</button>
            <button class="${tab === "stock" ? "active" : ""}" data-action="tab" data-tab="stock">Current Stock</button>
            <button class="${tab === "reports" ? "active" : ""}" data-action="tab" data-tab="reports">Reports</button>
            ${canAdmin ? `<button class="${tab === "google" ? "active" : ""}" data-action="tab" data-tab="google">Google Sheet</button>` : ""}
            ${canAdmin ? `<button class="${tab === "masters" ? "active" : ""}" data-action="tab" data-tab="masters">Masters</button>` : ""}
          </nav>
          <main class="wrap">
            ${notice ? `<div class="notice no-print">${esc(notice)}</div>` : ""}
            ${screen()}
          </main>`;
      }
      function loginScreen() {
        return `
          <main class="login">
            <div class="login-card">
              <section class="hero">
                <small>Store ERP Workspace</small>
                <h1>Requirement, purchase, stock receive aur department issue ek hi jagah.</h1>
                <p>Store person multi-item slip banayega, Purchase Manager approve/PO karega, aur current stock automatic dikhega.</p>
                <div class="grid" style="margin-top:24px">
                  <div class="card" style="background:rgb(255 255 255 / 10%);border-color:rgb(255 255 255 / 20%)">Multiple items in one document</div>
                  <div class="card" style="background:rgb(255 255 255 / 10%);border-color:rgb(255 255 255 / 20%)">Department-wise issue and current stock report</div>
                  <div class="card" style="background:rgb(255 255 255 / 10%);border-color:rgb(255 255 255 / 20%)">No install, no external database</div>
                </div>
              </section>
              <section class="login-panel">
                <h2>Login</h2>
                <p class="muted" style="margin-top:6px">Email aur PIN se login karein. Role Google Sheet ke Master_Users se decide hoga.</p>
                ${notice ? `<div class="notice">${esc(notice)}</div>` : ""}
                <form id="loginForm" class="grid" style="margin-top:18px">
                  <label>Google Sheet Web App URL
                    <input name="sheet_url" value="${esc(sheetApiUrl)}" placeholder="Admin ek baar URL paste kare" />
                  </label>
                  <label>Email
                    <input name="email" type="email" placeholder="store@gmail.com" required />
                  </label>
                  <label>PIN
                    <input name="pin" type="password" inputmode="numeric" placeholder="PIN" required />
                  </label>
                  <button class="primary">Login</button>
                </form>
                <small style="display:block;margin-top:12px">Admin first setup ke liye local sample login: admin@example.com / 9999</small>
              </section>
            </div>
          </main>`;
      }
      function screen() {
        if (!["store", "purchase_manager", "admin"].includes(user.role)) return dashboardScreen();
        if ((tab === "approval" || tab === "po") && !(user.role === "purchase_manager" || user.role === "admin")) tab = "dashboard";
        if ((tab === "google" || tab === "masters") && user.role !== "admin") tab = "dashboard";
        if (tab === "requirement") return requirementScreen();
        if (tab === "approval") return approvalScreen();
        if (tab === "po") return poScreen();
        if (tab === "receive") return receiptScreen();
        if (tab === "issue") return issueScreen();

      function metric(label, value, color) {
        return `<div class="card"><div class="muted">${label}</div><div class="metric" style="color:${color || "var(--ink)"}">${value}</div></div>`;
      }
      function input(label, name, type = "text", value = "", required = false) {
        return `<label>${label}<input name="${name}" type="${type}" value="${esc(value)}" ${required ? "required" : ""} /></label>`;
      }
      function textarea(label, name, value = "") {
        return `<label>${label}<textarea name="${name}">${esc(value)}</textarea></label>`;
      }
      function select(label, name, options, value = "", required = false) {
        return `<label>${label}<select name="${name}" ${required ? "required" : ""}>${options.map((o) => `<option value="${esc(o)}" ${o === value ? "selected" : ""}>${esc(o || "Select")}</option>`).join("")}</select></label>`;
      }
      function lineEditor(kind, title, opts = {}) {
        const lines = drafts[kind]?.length ? drafts[kind] : (drafts[kind] = [blankLine()]);
        return `
          <div style="margin-top:16px">
            <div class="between">
              <h3>${title}</h3>
              <button type="button" data-action="add-line" data-kind="${kind}">+ Add Item</button>
            </div>
            <div class="table-wrap" style="margin-top:10px">
              <table class="line-table">
                <thead>
                  <tr>
                    <th>Item</th><th>Specification</th><th>Qty</th><th>Unit</th>
                    ${opts.current ? "<th>Current Stock</th>" : ""}
                    ${opts.rate ? "<th>Rate</th><th>Amount</th>" : ""}
                    <th>Department</th><th>Use / Purpose</th>
                    ${opts.urgency ? "<th>Urgency</th>" : ""}
                    ${opts.vendor ? "<th>Vendor</th>" : ""}
                    <th>Remarks</th><th></th>
                  </tr>
                </thead>
                <tbody>${lines.map((line, index) => lineRow(kind, line, index, opts)).join("")}</tbody>
              </table>
            </div>
          </div>`;
      }
      function lineRow(kind, line, index, opts) {
        const item = itemById(line.item_id);
        if (item && !line.item_name) {
          line.item_name = item.name;
          line.spec = item.spec;
          line.unit = item.unit;
        }
        const current = line.item_id ? stockOf(line.item_id) : "";
        const amount = num(line.qty) * num(line.rate);
        return `
          <tr>
            <td>
              <select class="wide" data-kind="${kind}" data-row="${index}" data-field="item_id">
                <option value="">Select item</option>
                ${db.items.map((it) => `<option value="${it.id}" ${line.item_id === it.id ? "selected" : ""}>${esc(it.code)} - ${esc(it.name)}</option>`).join("")}
              </select>
              <input data-kind="${kind}" data-row="${index}" data-field="item_name" value="${esc(line.item_name)}" placeholder="Manual item name" />
            </td>
            <td><input data-kind="${kind}" data-row="${index}" data-field="spec" value="${esc(line.spec)}" placeholder="Size/grade" /></td>
            <td><input data-kind="${kind}" data-row="${index}" data-field="qty" type="number" value="${esc(line.qty)}" required /></td>
            <td><input data-kind="${kind}" data-row="${index}" data-field="unit" value="${esc(line.unit)}" required /></td>
            ${opts.current ? `<td><input value="${esc(current)}" readonly /></td>` : ""}
            ${opts.rate ? `<td><input data-kind="${kind}" data-row="${index}" data-field="rate" type="number" value="${esc(line.rate)}" /></td><td><input value="${money(amount)}" readonly /></td>` : ""}
            <td>${departmentSelect(kind, index, line.department)}</td>
            <td><textarea data-kind="${kind}" data-row="${index}" data-field="use" placeholder="Use / purpose">${esc(line.use)}</textarea></td>
            ${opts.urgency ? `<td>${lineSelect(kind, index, "urgency", ["Normal", "Urgent", "Critical"], line.urgency)}</td>` : ""}
            ${opts.vendor ? `<td><input data-kind="${kind}" data-row="${index}" data-field="vendor" value="${esc(line.vendor)}" /></td>` : ""}
            <td><textarea data-kind="${kind}" data-row="${index}" data-field="remarks">${esc(line.remarks)}</textarea></td>
            <td><button type="button" class="small danger" data-action="remove-line" data-kind="${kind}" data-index="${index}">X</button></td>
          </tr>`;
      }
      function departmentSelect(kind, index, value) {
        return `<select data-kind="${kind}" data-row="${index}" data-field="department"><option value="">Select</option>${db.departments.map((d) => `<option value="${esc(d)}" ${d === value ? "selected" : ""}>${esc(d)}</option>`).join("")}</select>`;
      }
      function lineSelect(kind, index, field, options, value) {
        return `<select data-kind="${kind}" data-row="${index}" data-field="${field}">${options.map((o) => `<option value="${esc(o)}" ${o === value ? "selected" : ""}>${esc(o)}</option>`).join("")}</select>`;
      }
      function cleanLines(lines) {
        return lines
          .filter((line) => line.item_id || line.item_name || num(line.qty) > 0)
          .map((line) => {
            const item = ensureMasterItem(line) || itemById(line.item_id);
            return {
              item_id: line.item_id || item?.id || "",
              item_name: line.item_name || item?.name || "",
              spec: line.spec || item?.spec || "",
              qty: num(line.qty),
              unit: line.unit || item?.unit || "Nos",
              department: line.department || "",
              use: line.use || "",
              urgency: line.urgency || "Normal",
              vendor: line.vendor || "",
              rate: num(line.rate),
              remarks: line.remarks || ""
            };
          });
      }

      function documentList(kind, withApproval = false) {
        const rows = db[kind] || [];
        if (!rows.length) return `<p class="muted">No records found.</p>`;
        return rows.map((doc) => documentCard(kind, doc, withApproval)).join("");
      }
      function documentCard(kind, doc, withApproval) {
        const title = doc.doc_no || doc.id;
        const party = doc.requested_by || doc.vendor || doc.issued_to || "";
        return `
          <div class="doc">
            <div class="doc-head">
              <div>
                <h3>${esc(title)} ${badge(doc.status)}</h3>
                <small>${esc(doc.date)} | ${esc(party)} | Lines: ${(doc.items || []).length} | Qty: ${docTotalQty(doc)}</small>
              </div>
              <div class="actions">
                ${withApproval && doc.status === "Pending" ? `<button class="good" data-action="doc-status" data-kind="${kind}" data-id="${doc.id}" data-status="Approved">Approve</button><button class="danger" data-action="doc-status" data-kind="${kind}" data-id="${doc.id}" data-status="Rejected">Reject</button>` : ""}
                <button data-action="print-doc" data-kind="${kind}" data-id="${doc.id}">Print</button>
              </div>
            </div>
            ${doc.remarks ? `<small>${esc(doc.remarks)}</small>` : ""}
            <div class="table-wrap">${docItemsTable(doc.items || [])}</div>
          </div>`;
      }
      function docItemsTable(lines) {
        return `
          <table>
            <thead><tr><th>Item</th><th>Spec</th><th>Qty</th><th>Unit</th><th>Department</th><th>Use</th><th>Urgency</th><th>Vendor</th><th>Rate</th><th>Remarks</th></tr></thead>
            <tbody>${lines.map((l) => `<tr><td>${esc(l.item_name)}</td><td>${esc(l.spec)}</td><td>${num(l.qty)}</td><td>${esc(l.unit)}</td><td>${esc(l.department)}</td><td>${esc(l.use)}</td><td>${l.urgency ? badge(l.urgency) : ""}</td><td>${esc(l.vendor)}</td><td>${l.rate ? money(l.rate) : ""}</td><td>${esc(l.remarks)}</td></tr>`).join("")}</tbody>
          </table>`;
      }
      function filteredItems() {
        return db.items.filter((item) => {
          const hay = `${item.code} ${item.name} ${item.spec} ${item.category} ${item.location}`.toLowerCase();
          const matches = !filters.item || hay.includes(filters.item.toLowerCase());
          const low = filters.status !== "low" || stockOf(item.id) <= num(item.min_stock);
          return matches && low;
        });
      }
      function stockTable(items, compact = false) {
        if (!items.length) return `<p class="muted">No stock records found.</p>`;
        return `
          <table>
            <thead><tr><th>Code</th><th>Item</th><th>Spec</th><th>Unit</th><th>Opening</th><th>Received</th><th>Issued</th><th>Current</th><th>Min</th>${compact ? "" : "<th>Location</th><th>Status</th>"}</tr></thead>
            <tbody>${items.map((item) => {
              const received = db.receipts.flatMap((d) => d.items || []).filter((l) => l.item_id === item.id).reduce((s, l) => s + num(l.qty), 0);
              const issued = db.issues.flatMap((d) => d.items || []).filter((l) => l.item_id === item.id).reduce((s, l) => s + num(l.qty), 0);
              const current = stockOf(item.id);
              const status = current <= num(item.min_stock) ? "Critical" : "Normal";
              return `<tr><td>${esc(item.code)}</td><td><b>${esc(item.name)}</b><br><small>${esc(item.category)}</small></td><td>${esc(item.spec)}</td><td>${esc(item.unit)}</td><td>${num(item.opening_stock)}</td><td>${received}</td><td>${issued}</td><td><b>${current}</b></td><td>${num(item.min_stock)}</td>${compact ? "" : `<td>${esc(item.location)}</td><td>${badge(status === "Critical" ? "Low Stock" : "OK")}</td>`}</tr>`;
            }).join("")}</tbody>
          </table>`;
      }
      function recentDocsTable() {
        const docs = [
          ...db.requirements.map((d) => ({ type: "PR", ...d })),
          ...db.orders.map((d) => ({ type: "PO", ...d })),
          ...db.receipts.map((d) => ({ type: "GRN", ...d })),
          ...db.issues.map((d) => ({ type: "ISS", ...d }))
        ]
          .sort((a, b) => String(b.date).localeCompare(String(a.date)))
          .slice(0, 10);
        return `<table style="min-width:700px"><thead><tr><th>Type</th><th>Doc No</th><th>Date</th><th>Status</th><th>Lines</th><th>Qty</th></tr></thead><tbody>${docs.map((d) => `<tr><td>${d.type}</td><td>${esc(d.doc_no)}</td><td>${esc(d.date)}</td><td>${badge(d.status)}</td><td>${(d.items || []).length}</td><td>${docTotalQty(d)}</td></tr>`).join("")}</tbody></table>`;
      }
      function movements() {
        const receiptMoves = db.receipts.flatMap((doc) => (doc.items || []).map((line) => ({ type: "Receipt", doc_no: doc.doc_no, date: doc.date, party: doc.vendor, ...line, qty: num(line.qty) })));
        const issueMoves = db.issues.flatMap((doc) => (doc.items || []).map((line) => ({ type: "Issue", doc_no: doc.doc_no, date: doc.date, party: doc.issued_to, ...line, qty: num(line.qty) })));
        return [...receiptMoves, ...issueMoves].sort((a, b) => String(b.date).localeCompare(String(a.date)));
      }
      function filteredMovements() {
        return movements().filter((m) => {
          const hay = `${m.doc_no} ${m.item_name} ${m.spec} ${m.department} ${m.use} ${m.party}`.toLowerCase();
          return (!filters.q || hay.includes(filters.q.toLowerCase())) && (!filters.department || String(m.department).toLowerCase().includes(filters.department.toLowerCase())) && (!filters.from || m.date >= filters.from) && (!filters.to || m.date <= filters.to);
        });
      }
      function departmentSummaryTable() {
        const map = new Map();
        db.issues.flatMap((d) => d.items || []).forEach((line) => {
          const key = line.department || "Unassigned";
          map.set(key, (map.get(key) || 0) + num(line.qty));
        });
        const rows = [...map.entries()].sort((a, b) => b[1] - a[1]);
        if (!rows.length) return `<p class="muted">No issue data.</p>`;
        return `<table style="min-width:500px"><thead><tr><th>Department</th><th>Total Issued Qty</th></tr></thead><tbody>${rows.map(([dept, qty]) => `<tr><td>${esc(dept)}</td><td>${qty}</td></tr>`).join("")}</tbody></table>`;
      }
      function itemMovementSummaryTable() {
        const map = new Map();
        movements().forEach((m) => {
          const key = `${m.item_name} | ${m.spec}`;
          const row = map.get(key) || { item: m.item_name, spec: m.spec, received: 0, issued: 0 };
          if (m.type === "Receipt") row.received += num(m.qty);
          if (m.type === "Issue") row.issued += num(m.qty);
          map.set(key, row);
        });
        const rows = [...map.values()];
        if (!rows.length) return `<p class="muted">No movement data.</p>`;
        return `<table style="min-width:700px"><thead><tr><th>Item</th><th>Spec</th><th>Received</th><th>Issued</th></tr></thead><tbody>${rows.map((r) => `<tr><td>${esc(r.item)}</td><td>${esc(r.spec)}</td><td>${r.received}</td><td>${r.issued}</td></tr>`).join("")}</tbody></table>`;
      }
      function ledgerTable() {
        const rows = filteredMovements();
        if (!rows.length) return `<p class="muted">No ledger movement found.</p>`;
        return `<table><thead><tr><th>Date</th><th>Type</th><th>Doc No</th><th>Item</th><th>Spec</th><th>Qty</th><th>Unit</th><th>Department</th><th>Use</th><th>Party</th></tr></thead><tbody>${rows.map((m) => `<tr><td>${esc(m.date)}</td><td>${esc(m.type)}</td><td>${esc(m.doc_no)}</td><td>${esc(m.item_name)}</td><td>${esc(m.spec)}</td><td>${m.qty}</td><td>${esc(m.unit)}</td><td>${esc(m.department)}</td><td>${esc(m.use)}</td><td>${esc(m.party)}</td></tr>`).join("")}</tbody></table>`;
      }

      function exportRows(kind) {
        if (kind === "stock") {
          return db.items.map((item) => ({ code: item.code, item: item.name, spec: item.spec, unit: item.unit, opening: item.opening_stock, current: stockOf(item.id), min_stock: item.min_stock, location: item.location, category: item.category }));
        }
        if (kind === "ledger") return filteredMovements();
        const docs = db[kind] || [];
        return docs.flatMap((doc) => (doc.items || []).map((line) => ({ doc_no: doc.doc_no, date: doc.date, status: doc.status, requested_by: doc.requested_by || "", vendor: doc.vendor || line.vendor || "", issued_to: doc.issued_to || "", item: line.item_name, spec: line.spec, qty: line.qty, unit: line.unit, department: line.department, use: line.use, urgency: line.urgency || "", rate: line.rate || "", remarks: line.remarks || doc.remarks || "" })));
      }
      function downloadCsv(kind) {
        const rows = exportRows(kind);
        if (!rows.length) {
          notice = "Export ke liye data nahi mila.";
          render();
          return;
        }
        const headers = Object.keys(rows[0]);
        const csv = [headers.join(","), ...rows.map((row) => headers.map((h) => `"${String(row[h] ?? "").replaceAll('"', '""')}"`).join(","))].join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${kind}-${today()}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
      }
      function ensureSheetUrl() {
        if (!sheetApiUrl) {
          notice = "Pehle Google Sheet screen me Web App URL save karein.";
          tab = "google";
          render();
          return false;
        }
        return true;
      }
      function jsonpSheet(action) {
        return new Promise((resolve, reject) => {
          if (!ensureSheetUrl()) return reject(new Error("Missing Web App URL"));
          const callback = "__sheetCallback_" + Date.now() + "_" + Math.random().toString(16).slice(2);
          const script = document.createElement("script");
          const sep = sheetApiUrl.includes("?") ? "&" : "?";
          window[callback] = (result) => {
            delete window[callback];
            script.remove();
            resolve(result);
          };
          script.onerror = () => {
            delete window[callback];
            script.remove();
            reject(new Error("Google Sheet connection failed."));
          };
          script.src = `${sheetApiUrl}${sep}action=${encodeURIComponent(action)}&callback=${encodeURIComponent(callback)}&t=${Date.now()}`;
          document.body.appendChild(script);
        });
      }
      function postSheet(payload) {
        return new Promise((resolve, reject) => {
          if (!ensureSheetUrl()) return reject(new Error("Missing Web App URL"));
          const iframeName = "sheetPostFrame_" + Date.now();
          const iframe = document.createElement("iframe");
          iframe.name = iframeName;
          iframe.style.display = "none";
          const form = document.createElement("form");
          form.method = "POST";
          form.action = sheetApiUrl;
          form.target = iframeName;
          form.style.display = "none";
          const actionInput = document.createElement("input");
          actionInput.name = "action";
          actionInput.value = "write";
          const payloadInput = document.createElement("input");
          payloadInput.name = "payload";
          payloadInput.value = JSON.stringify(payload);
          form.appendChild(actionInput);
          form.appendChild(payloadInput);
          document.body.appendChild(iframe);
          document.body.appendChild(form);
          iframe.onload = () => {
            setTimeout(() => {
              form.remove();
              iframe.remove();
              resolve({ ok: true });
            }, 300);
          };
          iframe.onerror = () => {
            form.remove();
            iframe.remove();
            reject(new Error("Google Sheet save failed."));
          };
          form.submit();
        });
      }
      async function setupSheet() {
        const result = await jsonpSheet("setup");
        if (!result.ok) throw new Error(result.error || "Setup failed");
        syncStatus = "Google Sheet tabs ready.";
        notice = "Google Sheet master/database tabs create/check ho gaye.";
        render();
      }
      async function pullSheet() {
        const result = await jsonpSheet("read");
        if (!result.ok) throw new Error(result.error || "Pull failed");
        db = normalize(result.data || {});
        saveDb();
        syncStatus = "Last pull: " + new Date().toLocaleString("en-IN");
        notice = "Google Sheet se data app me pull ho gaya.";
        render();
      }
      async function pushSheet() {
        await postSheet(db);
        syncStatus = "Last push: " + new Date().toLocaleString("en-IN");
        notice = "Current app data Google Sheet me push ho gaya. Sheet refresh karke check kar sakte hain.";
        render();
      }
      function printDoc(kind, docId) {
        const doc = (db[kind] || []).find((d) => d.id === docId);
        if (!doc) return;
        const titleMap = { requirements: "Purchase Requirement", orders: "Purchase Order", receipts: "Goods Receipt Note", issues: "Material Issue Slip" };
        const win = window.open("", "_blank");
        win.document.write(`
          <html><head><title>${esc(doc.doc_no)}</title><style>body{font-family:Arial,sans-serif;padding:28px;color:#0f172a}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border:1px solid #cbd5e1;padding:7px;text-align:left}th{background:#f1f5f9}.head{text-align:center;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:18px}.sign{display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:60px}.sign div{border-top:1px solid #111;padding-top:10px}</style></head>
          <body>
            <div class="head"><h1>YOUR COMPANY NAME</h1><p>Registered Office Address | GSTIN | Contact</p><h2>${titleMap[kind] || "Document"}</h2></div>
            <p><b>Doc No:</b> ${esc(doc.doc_no)} &nbsp; <b>Date:</b> ${esc(doc.date)} &nbsp; <b>Status:</b> ${esc(doc.status)}</p>
            <p><b>Party/User:</b> ${esc(doc.requested_by || doc.vendor || doc.issued_to || "")}</p>
            <p><b>Remarks:</b> ${esc(doc.remarks || "-")}</p>
            ${docItemsTable(doc.items || [])}
            <div class="sign"><div>Store / Prepared By<br><b>${esc(currentUserName(doc.created_by) || "")}</b></div><div>Approved / Checked By<br><b>${esc(currentUserName(doc.approved_by) || "")}</b></div></div>
          </body></html>`);
        win.document.close();
        win.print();
      }

      function updateLineFromInput(target) {
        const kind = target.dataset.kind;
        const row = Number(target.dataset.row);
        const field = target.dataset.field;
        if (!kind || Number.isNaN(row) || !field) return;
        drafts[kind] ||= [blankLine()];
        drafts[kind][row] ||= blankLine();
        drafts[kind][row][field] = target.value;
        if (field === "item_id") {
          const item = itemById(target.value);
          if (item) {
            drafts[kind][row].item_name = item.name;
            drafts[kind][row].spec = item.spec;
            drafts[kind][row].unit = item.unit;
          }
          render();
        }
      }
      function updateFilters(target) {
        if (!Object.prototype.hasOwnProperty.call(filters, target.name)) return false;
        filters[target.name] = target.value;
        render();
        return true;
      }
      function selectedFormData(form) {
        return Object.fromEntries(new FormData(form).entries());
      }
      function requireLines(kind) {
        const lines = cleanLines(drafts[kind] || []);
        if (!lines.length || lines.some((line) => !line.item_name || !line.qty || num(line.qty) <= 0)) {
          notice = "Kam se kam ek valid item, quantity aur details bharna zaroori hai.";
          render();
          return null;
        }
        return lines;
      }

      document.addEventListener("click", async (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        if (target.tagName === "BUTTON") target.disabled = true;
        const action = target.dataset.action;
        try {
        if (action === "login") {
          user = db.profiles.find((p) => p.id === target.dataset.id);
          tab = "dashboard";
          notice = "";
          render();
        }
        if (action === "logout") {
          user = null;
          notice = "";
          render();
        }
        if (action === "tab") {
          tab = target.dataset.tab;
          notice = "";
          render();
        }
        if (action === "add-line") {
          drafts[target.dataset.kind].push(blankLine());
          render();
        }
        if (action === "remove-line") {
          const kind = target.dataset.kind;
          drafts[kind].splice(Number(target.dataset.index), 1);
          if (!drafts[kind].length) drafts[kind].push(blankLine());
          render();
        }
        if (action === "clear-draft") {
          drafts[target.dataset.kind] = [blankLine()];
          render();
        }
        if (action === "doc-status") {
          const list = db[target.dataset.kind];
          const doc = list.find((d) => d.id === target.dataset.id);
          if (doc) {
            doc.status = target.dataset.status;
            doc.approved_by = user.id;
            doc.approved_at = new Date().toISOString();
            saveDb();
            notice = `${doc.doc_no} ${doc.status} ho gaya.`;
            render();
          }
        }
        if (action === "load-po-lines") {
          const reqId = document.querySelector("select[name=req_id]")?.value;
          const req = db.requirements.find((r) => r.id === reqId);
          drafts.po = req ? req.items.map((line) => ({ ...blankLine(), ...line, rate: line.rate || "" })) : [blankLine()];
          render();
        }
        if (action === "print-doc") printDoc(target.dataset.kind, target.dataset.id);
        if (action === "export") downloadCsv(target.dataset.kind);
        if (action === "save-sheet-url") {
          sheetApiUrl = document.getElementById("sheetApiUrl")?.value.trim() || "";
          localStorage.setItem(SHEET_URL_KEY, sheetApiUrl);
          syncStatus = sheetApiUrl ? "Google Sheet URL saved." : "Google Sheet URL not connected.";
          notice = sheetApiUrl ? "Web App URL save ho gaya." : "Web App URL blank hai.";
          render();
        }
        if (action === "setup-sheet") await setupSheet();
        if (action === "pull-sheet") await pullSheet();
        if (action === "push-sheet") await pushSheet();
        } catch (error) {
          notice = error.message || "Action complete nahi ho paya.";
          syncStatus = "Google Sheet sync error.";
          render();
        } finally {
          if (target.tagName === "BUTTON") target.disabled = false;
        }
      });
      document.addEventListener("input", (event) => {
        updateLineFromInput(event.target);
        updateFilters(event.target);
      });
      document.addEventListener("change", (event) => {
        updateLineFromInput(event.target);
        updateFilters(event.target);
      });
      document.addEventListener("submit", async (event) => {
        event.preventDefault();
        const form = event.target;
        const data = selectedFormData(form);
        if (form.id === "loginForm") {
          sheetApiUrl = String(data.sheet_url || "").trim();
          if (sheetApiUrl) {
            localStorage.setItem(SHEET_URL_KEY, sheetApiUrl);
            try {
              const result = await jsonpSheet("read");
              if (result.ok) {
                db = normalize(result.data || {});
                saveDb();
                syncStatus = "Users pulled from Google Sheet.";
              } else {
                throw new Error(result.error || "Google Sheet read failed");
              }
            } catch (error) {
              notice = "Google Sheet se user data read nahi hua. URL/deployment check karein.";
              render();
              return;
            }
          }
          const found = findLoginUser(data.email, data.pin);
          if (!found) {
            notice = "Email ya PIN galat hai, ya user inactive hai.";
            render();
            return;
          }
          user = found;
          tab = "dashboard";
          notice = "";
          render();
          return;
        }
        if (form.id === "reqForm") {
          const lines = requireLines("req");
          if (!lines) return;
          const docNo = nextNo("REQ");
          db.requirements.unshift({ id: id(), doc_no: docNo, date: data.date, requested_by: data.requested_by, plant: data.plant, created_by: user.id, status: "Pending", approved_by: null, approved_at: null, remarks: data.remarks, created_at: new Date().toISOString(), items: lines });
          drafts.req = [blankLine()];
          saveDb();
          notice = `${docNo} submit ho gaya.`;
          tab = "dashboard";
          render();
        }
        if (form.id === "poForm") {
          const lines = requireLines("po");
          if (!lines) return;
          const req = db.requirements.find((r) => r.id === data.req_id);
          const docNo = nextNo("PO");
          db.orders.unshift({ id: id(), doc_no: docNo, requirement_id: data.req_id, requirement_no: req?.doc_no || "", date: data.date, vendor: data.vendor, expected_delivery_date: data.expected_delivery_date, created_by: user.id, status: "Ordered", remarks: data.remarks, items: lines.map((line) => ({ ...line, vendor: data.vendor || line.vendor })) });
          if (req) req.status = "Ordered";
          drafts.po = [];
          saveDb();
          notice = `${docNo} save ho gaya.`;
          render();
        }
        if (form.id === "receiptForm") {
          const lines = requireLines("receipt");
          if (!lines) return;
          const docNo = nextNo("GRN");
          db.receipts.unshift({ id: id(), doc_no: docNo, date: data.date, vendor: data.vendor, challan_no: data.challan_no, created_by: user.id, status: "Posted", remarks: data.remarks, items: lines.map((line) => ({ ...line, vendor: data.vendor || line.vendor })) });
          drafts.receipt = [blankLine()];
          saveDb();
          notice = `${docNo} post ho gaya. Stock add ho gaya.`;
          render();
        }
        if (form.id === "issueForm") {
          const lines = requireLines("issue");
          if (!lines) return;
          const shortage = lines.find((line) => line.item_id && num(line.qty) > stockOf(line.item_id));
          if (shortage) {
            notice = `${shortage.item_name} ka stock available quantity se kam hai. Current stock: ${stockOf(shortage.item_id)}.`;
            render();
            return;
          }
          const docNo = nextNo("ISS");
          db.issues.unshift({ id: id(), doc_no: docNo, date: data.date, issued_to: data.issued_to, plant: data.plant, created_by: user.id, status: "Posted", remarks: data.remarks, items: lines });
          drafts.issue = [blankLine()];
          saveDb();
          notice = `${docNo} post ho gaya. Stock issue ho gaya.`;
          render();
        }
        if (form.id === "itemForm") {
          const existing = db.items.find((item) => item.code === data.code && data.code);
          const payload = { id: existing?.id || id(), code: data.code || nextItemCode(), name: data.name, spec: data.spec, unit: data.unit, category: data.category, location: data.location, opening_stock: num(data.opening_stock), min_stock: num(data.min_stock) };
          if (existing) Object.assign(existing, payload);
          else db.items.unshift(payload);
          saveDb();
          notice = "Item master save ho gaya.";
          render();
        }
        if (form.id === "profileForm") {
          const profile = { id: data.id || id(), full_name: data.full_name, email: String(data.email || "").trim().toLowerCase(), pin: String(data.pin || ""), role: data.role, plant_access: data.plant_access, active: data.active || "TRUE" };
          const index = db.profiles.findIndex((p) => p.id === profile.id);
          if (index >= 0) db.profiles[index] = profile;
          else db.profiles.unshift(profile);
          saveDb();
          notice = "User save ho gaya.";
          render();
        }
        if (form.id === "departmentForm") {
          if (!db.departments.includes(data.department)) db.departments.push(data.department);
          saveDb();
          notice = "Department add ho gaya.";
          render();
        }
      });

      render();
    </script>
  </body>
</html>
